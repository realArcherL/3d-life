<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Miami GP — Label Placer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }
        #map { width: 100%; height: 100vh; }

        #toolbar {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(10, 10, 10, 0.92);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 10px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            max-width: 95vw;
        }
        #toolbar button {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        #toolbar button:hover { background: rgba(255, 255, 255, 0.15); }
        #toolbar button.active { background: #e10600; border-color: #e10600; }
        #toolbar button.export-btn { background: #0a8f3c; border-color: #0a8f3c; }
        #toolbar button.export-btn:hover { background: #0cb34d; }
        #toolbar input {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: #fff;
            padding: 6px 10px;
            font-size: 13px;
            width: 60px;
            text-align: center;
        }
        #toolbar span {
            font-size: 12px;
            color: #999;
            letter-spacing: 0.5px;
        }

        #sidebar {
            position: fixed;
            right: 0; top: 0;
            width: 380px; height: 100vh;
            z-index: 1000;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(12px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            transform: translateX(100%);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        #sidebar.open { transform: translateX(0); }
        #sidebar-header {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #sidebar-header h3 { font-size: 14px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
        #sidebar-header button { background: none; border: none; color: #999; font-size: 20px; cursor: pointer; }
        #coord-output {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 11px;
            color: #0f0;
            background: #050505;
            white-space: pre;
            line-height: 1.6;
            user-select: all;
        }
        #sidebar-actions {
            padding: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; gap: 8px;
        }
        #sidebar-actions button {
            flex: 1;
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 10px;
            font-size: 12px;
            cursor: pointer;
        }
        #sidebar-actions button:hover { background: rgba(255,255,255,0.15); }
        #sidebar-actions .copy-btn { background: #0a8f3c; border-color: #0a8f3c; }

        #instructions {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 10px 20px;
            font-size: 12px;
            color: #888;
            text-align: center;
        }

        .leaflet-container { background: #111 !important; cursor: crosshair !important; }

        .label-marker {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px !important;
            height: 28px !important;
            margin-left: -14px !important;
            margin-top: -14px !important;
            background: rgba(0, 5, 8, 0.85);
            border: 2px solid #ff2d00;
            border-radius: 50%;
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            font-family: 'Segoe UI', system-ui, monospace;
            cursor: grab !important;
            box-shadow: 0 0 8px rgba(255, 45, 0, 0.5);
            transition: transform 0.1s;
        }
        .label-marker:hover { transform: scale(1.3); }
        .label-marker.sf { border-color: #00f0ff; color: #00f0ff; box-shadow: 0 0 8px rgba(0,240,255,0.5); }
    </style>
</head>

<body>
    <div id="toolbar">
        <button id="btn-place" class="active" title="Click map to place next label">📍 Place</button>
        <span>Next #</span>
        <input id="next-num" type="number" value="1" min="1" max="99" />
        <button id="btn-sf" title="Place S/F marker">🏁 S/F</button>
        <button id="btn-undo" title="Remove last label">↩ Undo</button>
        <button id="btn-clear" title="Clear all">✕ Clear</button>
        <span id="label-count">0 labels</span>
        <button id="btn-export" class="export-btn">▶ Export</button>
    </div>

    <div id="map"></div>

    <div id="sidebar">
        <div id="sidebar-header">
            <h3>Turn Positions Export</h3>
            <button id="btn-close-sidebar">&times;</button>
        </div>
        <div id="coord-output"></div>
        <div id="sidebar-actions">
            <button class="copy-btn" id="btn-copy">Copy to Clipboard</button>
        </div>
    </div>

    <div id="instructions">
        Click on bends to place turn numbers &bull; Drag to adjust &bull; Right-click to delete &bull; Export to get TURN_POSITIONS array
    </div>

    <script>
        (function () {
            const CENTER_LAT = 25.9581;
            const CENTER_LON = -80.2389;
            const M_LAT = 111320;
            const M_LON = 111320 * Math.cos(CENTER_LAT * Math.PI / 180);

            const map = L.map('map', {
                center: [CENTER_LAT, CENTER_LON],
                zoom: 17,
                zoomControl: false,
                attributionControl: true
            });

            // Satellite tiles
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                maxZoom: 20,
                attribution: '&copy; Esri, Maxar, Earthstar Geographics'
            }).addTo(map);

            // Street labels overlay
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}', {
                maxZoom: 20,
                opacity: 0.25
            }).addTo(map);

            L.control.zoom({ position: 'bottomright' }).addTo(map);

            // ── Draw existing track outline from TRACK_POINTS ──
            const TRACK_POINTS = [
                [53.4, -175.1], [357.4, 15.1], [361.0, 41.8], [300.3, 92.3],
                [293.2, 117.3], [294.8, 190.9], [240.2, 238.4], [159.6, 260.4],
                [118.2, 259.6], [69.8, 248.3], [-184.1, 96.4], [-237.3, 100.3],
                [-298.5, 137.7], [-334.5, 147.1], [-370.4, 138.8], [-439.7, 81.9],
                [-476.8, 77.2], [-510.7, 84.2], [-552.6, 103.6], [-574.0, 127.7],
                [-588.0, 159.4], [-585.7, 198.4], [-557.8, 222.0], [-495.6, 215.8],
                [-342.6, 246.5], [-55.3, 241.3], [165.0, 310.9], [197.7, 316.3],
                [286.8, 318.1], [379.1, 299.3], [685.7, 180.7], [821.8, 98.7],
                [827.2, 78.3], [804.1, 61.6], [776.7, 40.7], [762.2, 14.9],
                [766.0, -14.7], [781.5, -33.5], [804.9, -41.6], [857.3, -41.5],
                [878.7, -48.5], [914.7, -111.9], [893.2, -125.9], [910.4, -210.7],
                [894.8, -224.7], [571.4, -237.3], [248.0, -250.0], [-75.3, -262.6],
                [-398.7, -275.2], [-410.1, -267.7], [-405.6, -242.4], [-317.7, -185.5],
                [-292.5, -180.6], [-139.3, -238.7], [-48.7, -229.3],
            ];

            // Convert [x,z] metres → [lat,lng]
            function metresToLatLng(x, z) {
                return [CENTER_LAT - z / M_LAT, CENTER_LON + x / M_LON];
            }
            function latLngToMetres(lat, lng) {
                const x = (lng - CENTER_LON) * M_LON;
                const z = -(lat - CENTER_LAT) * M_LAT;
                return { x: +x.toFixed(1), z: +z.toFixed(1) };
            }

            // Draw track outline on the map
            const trackLatLngs = TRACK_POINTS.map(([x, z]) => metresToLatLng(x, z));
            trackLatLngs.push(trackLatLngs[0]); // close loop
            L.polyline(trackLatLngs, {
                color: '#00f0ff', weight: 3, opacity: 0.7, dashArray: null
            }).addTo(map);

            // ── State ──
            let labels = []; // { num, lat, lng, marker }
            let isPlacing = true;
            let nextNum = 1;

            const nextNumInput = document.getElementById('next-num');
            const labelCount = document.getElementById('label-count');

            function updateCount() {
                labelCount.textContent = `${labels.length} label${labels.length !== 1 ? 's' : ''}`;
            }

            function createLabelMarker(num, lat, lng, isSF) {
                const displayText = isSF ? 'S/F' : String(num).padStart(2, '0');
                const icon = L.divIcon({
                    className: `label-marker ${isSF ? 'sf' : ''}`,
                    html: displayText,
                    iconSize: [28, 28],
                });
                const marker = L.marker([lat, lng], {
                    icon, draggable: true, zIndexOffset: 1000
                }).addTo(map);

                const entry = { num: isSF ? 'S/F' : num, lat, lng, marker, isSF: !!isSF };
                labels.push(entry);

                marker.on('drag', () => {
                    const pos = marker.getLatLng();
                    entry.lat = pos.lat;
                    entry.lng = pos.lng;
                });

                marker.on('contextmenu', (e) => {
                    L.DomEvent.stopPropagation(e);
                    map.removeLayer(marker);
                    labels = labels.filter(l => l !== entry);
                    updateCount();
                });

                updateCount();

                if (!isSF) {
                    nextNum = num + 1;
                    nextNumInput.value = nextNum;
                }
            }

            // ── Map click ──
            map.on('click', (e) => {
                if (!isPlacing) return;
                createLabelMarker(parseInt(nextNumInput.value), e.latlng.lat, e.latlng.lng, false);
            });

            // ── Toolbar ──
            document.getElementById('btn-place').addEventListener('click', function () {
                isPlacing = !isPlacing;
                this.classList.toggle('active', isPlacing);
                map.getContainer().style.cursor = isPlacing ? 'crosshair' : 'grab';
            });

            document.getElementById('btn-sf').addEventListener('click', () => {
                // Toggle into S/F placement mode — next click places S/F
                const handler = (e) => {
                    createLabelMarker(0, e.latlng.lat, e.latlng.lng, true);
                    map.off('click', handler);
                };
                map.on('click', handler);
            });

            document.getElementById('btn-undo').addEventListener('click', () => {
                if (!labels.length) return;
                const last = labels.pop();
                map.removeLayer(last.marker);
                if (!last.isSF) {
                    nextNum = last.num;
                    nextNumInput.value = nextNum;
                }
                updateCount();
            });

            document.getElementById('btn-clear').addEventListener('click', () => {
                if (!labels.length || !confirm('Clear all labels?')) return;
                labels.forEach(l => map.removeLayer(l.marker));
                labels = [];
                nextNum = 1;
                nextNumInput.value = 1;
                updateCount();
            });

            // ── Export ──
            function generateExport() {
                if (!labels.length) return '// No labels placed yet';

                const turnLabels = labels
                    .filter(l => !l.isSF)
                    .sort((a, b) => a.num - b.num);

                const sfLabel = labels.find(l => l.isSF);

                const lines = [
                    `// ── Turn Positions for main.js ──`,
                    `// ${turnLabels.length} turns${sfLabel ? ' + S/F' : ''} | Placed: ${new Date().toISOString()}`,
                    `// Paste this into main.js replacing the existing TURN_POSITIONS array`,
                    ``,
                    `const TURN_POSITIONS = [`,
                ];

                turnLabels.forEach((l, i) => {
                    const { x, z } = latLngToMetres(l.lat, l.lng);
                    const comma = i < turnLabels.length - 1 ? ',' : ',';
                    lines.push(`  { n: ${l.num}, x: ${x}, z: ${z} },`);
                });

                lines.push(`];`);

                if (sfLabel) {
                    const { x, z } = latLngToMetres(sfLabel.lat, sfLabel.lng);
                    lines.push(``);
                    lines.push(`// S/F marker position`);
                    lines.push(`// sprite.position.set(${x}, PLATFORM_Y + 35, ${z});`);
                }

                return lines.join('\n');
            }

            document.getElementById('btn-export').addEventListener('click', () => {
                document.getElementById('coord-output').textContent = generateExport();
                document.getElementById('sidebar').classList.add('open');
            });

            document.getElementById('btn-close-sidebar').addEventListener('click', () => {
                document.getElementById('sidebar').classList.remove('open');
            });

            document.getElementById('btn-copy').addEventListener('click', () => {
                navigator.clipboard.writeText(generateExport()).then(() => {
                    const btn = document.getElementById('btn-copy');
                    btn.textContent = 'Copied!';
                    setTimeout(() => btn.textContent = 'Copy to Clipboard', 1500);
                });
            });

            // ── Keyboard shortcuts ──
            document.addEventListener('keydown', (e) => {
                if (e.key === 'z' && (e.ctrlKey || e.metaKey)) {
                    e.preventDefault();
                    document.getElementById('btn-undo').click();
                }
                if (e.key === 'Escape') {
                    document.getElementById('sidebar').classList.remove('open');
                }
            });

        })();
    </script>
</body>

</html>
